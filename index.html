<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Australian Psychology & Mental Health News</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; padding: 16px; }
h2 { font-size: 22px; font-weight: 600; color: #3C3C3C; text-align: center; margin-bottom: 16px; }
#news-items { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 700px) { #news-items { grid-template-columns: 1fr; } }
.card { display: flex; gap: 12px; padding: 14px; border-radius: 8px; text-decoration: none; color: inherit; border: 1px solid #e8e8e8; transition: box-shadow 0.2s, border-color 0.2s; background: #fff; }
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #8AC642; }
.info { flex: 1; min-width: 0; }
.title { font-size: 14px; font-weight: 600; color: #3C3C3C; line-height: 1.35; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.meta { font-size: 11px; color: #999; }
.source { color: #8AC642; font-weight: 500; }
#loading { text-align: center; padding: 40px; color: #666; }
#error { display: none; text-align: center; padding: 40px; color: #999; }
#error a { color: #8AC642; font-weight: 500; }
#updated { text-align: center; font-size: 11px; color: #bbb; margin-top: 14px; }
</style>
</head>
<body>
<h2>Australian Psychology &amp; Mental Health News</h2>
<div id="loading">Loading news…</div>
<div id="error"></div>
<div id="news-items" style="display:none"></div>
<div id="updated"></div>
<script>
(function () {
  var QUERY = 'australian mental health OR psychology OR wellbeing OR psychologist';
  var GNEWS = 'https://news.google.com/rss/search?q=' + encodeURIComponent(QUERY) + '&hl=en-AU&gl=AU&ceid=AU:en';
  var MAX = 8, KEY = 'mh_news_cache_v3';
  var itemsEl = document.getElementById('news-items'),
      loadingEl = document.getElementById('loading'),
      errorEl = document.getElementById('error'),
      updatedEl = document.getElementById('updated');

  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmt(d){ if(!d) return ''; var t=new Date(d); return isNaN(t)?'':t.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}); }

  function render(items, updated){
    if(!items || !items.length) return false;
    itemsEl.innerHTML = items.slice(0,MAX).map(function(it){
      var date = fmt(it.date);
      return '<a class="card" href="'+encodeURI(it.link||'#')+'" target="_blank" rel="noopener"><div class="info">' +
             '<div class="title">'+esc(it.title)+'</div>' +
             '<div class="meta"><span class="source">'+esc(it.source)+'</span>'+(date?' &middot; '+date:'')+'</div>' +
             '</div></a>';
    }).join('');
    loadingEl.style.display='none'; errorEl.style.display='none'; itemsEl.style.display='grid';
    if(updated){ var u=new Date(updated); if(!isNaN(u)) updatedEl.textContent='Updated '+u.toLocaleDateString('en-AU',{day:'numeric',month:'short'})+' '+u.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}); }
    return true;
  }
  function showError(){
    loadingEl.style.display='none';
    if(itemsEl.children.length===0){
      errorEl.innerHTML='Latest headlines are updating. <a href="'+GNEWS+'" target="_blank" rel="noopener">Open Australian mental-health news &rarr;</a>';
      errorEl.style.display='block';
    }
  }

  // Instant paint from last good copy, so the panel is never blank or stuck.
  try { var c=JSON.parse(localStorage.getItem(KEY)||'null'); if(c&&c.items) render(c.items, c.updated); } catch(e){}

  // Refresh from the static file the GitHub Action keeps up to date (same origin — no CORS, no proxy).
  fetch('./news.json?ts=' + Date.now(), { cache:'no-store' })
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(function(d){
      if(render(d.items, d.updated)){ try{ localStorage.setItem(KEY, JSON.stringify(d)); }catch(e){} }
      else showError();
    })
    .catch(function(){ if(itemsEl.children.length===0) showError(); });
})();
</script>
</body>
</html>
